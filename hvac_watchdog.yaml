hvac_watchdog:
  module: hvac_watchdog
  class: HvacWatchdog
  log: hvac_watchdog_log

  # --- Auth for the mitsubishi2MQTT web UI -------------------------------
  # Username is hard-coded to "admin" in the firmware; only the password is a
  # secret. Keep the real value in secrets.yaml (this folder, gitignored) and
  # reference it with !secret. Copy secrets.yaml.example to get started.
  username: "admin"
  password: !secret mitsubishi_web_password

  # --- Recovery policy ---------------------------------------------------
  # How long a unit must stay "unavailable" before we reboot it (rides out
  # brief MQTT blips).
  unavailable_grace_seconds: 300
  # After a reboot, wait this long (boot + Wi-Fi/MQTT reconnect) before
  # re-checking / rebooting again.
  reboot_cooldown_seconds: 300
  # Stop after this many consecutive reboots without the unit becoming stable,
  # then notify instead of looping.
  max_consecutive_reboots: 3
  # Flapping detection: a unit that bounces to "unavailable" this many times
  # within flap_window_seconds is treated as "flapping". Flappers are NOT
  # rebooted (a reboot doesn't fix a Wi-Fi/power problem) - they only trigger a
  # rate-limited notification. A flapper still gets the normal grace timer, so
  # if it stops bouncing and stays down it is still rebooted as a real outage.
  flap_threshold: 3
  flap_window_seconds: 600
  # At most one "is flapping" notification per device per this interval
  # (default 86400 = once per day) so a chronic flapper doesn't spam you.
  flap_notify_interval_seconds: 86400
  # Set false to silence flapping notifications entirely (too noisy).
  flap_notify_enabled: false
  # A unit must stay continuously online this long before its reboot escalation
  # (consecutive count / gave-up) is cleared. Keeps a flapper - which "recovers"
  # constantly - escalating until it is genuinely stable.
  stable_seconds: 300
  # Per-request HTTP timeout when talking to a board.
  http_timeout_seconds: 10
  # Master switch: set false to only track availability (never auto-reboot).
  reboot_enabled: true

  # --- HA sensors --------------------------------------------------------
  # Publish sensor.<prefix>_<name>_status / _unavailable_count / _reboots so
  # the stats can be graphed. Set publish_sensors: false to disable.
  publish_sensors: true
  sensor_prefix: hvac_watchdog

  # --- Notifications (optional) ------------------------------------------
  # A notify.* service called only when action is taken or needed: after a
  # successful reboot, when a reboot can't be performed (board unreachable),
  # and when the app gives up after max_consecutive_reboots. No notifications
  # are sent for routine unavailable/recovery transitions. Leave unset to only
  # log.
  notify_service: notify.mobile_app_stefan

  # States that count as "the unit is down".
  unavailable_states:
    - unavailable
    - unknown

  # --- Firmware update check (optional) ----------------------------------
  # Once a week, check GitHub for a newer release and notify (via
  # notify_service) if any unit's installed firmware is behind. Each unit is
  # compared against the latest release of *its* firmware's repo (see the
  # per-device `firmware:` field below). Runs at check_time, but only on
  # check_day (set check_day: null to check every day). Fire the event
  # "hvac_watchdog_fwcheck" to run it on demand.
  firmware_check:
    enabled: true
    check_day: sun
    check_time: "09:00:00"
    # Default repos per firmware (override only if you fork):
    #   mitsubishi2mqtt -> gysmo38/mitsubishi2MQTT
    #   heatpump        -> sslivins/mitsubishi-heatpump
    # repos:
    #   heatpump: sslivins/mitsubishi-heatpump

  # --- Devices -----------------------------------------------------------
  # Each unit: the climate entity to watch + the board's IP (host). Optional
  # `tracker` (a device_tracker) is consulted for a live `ip` attribute first
  # for DHCP resilience, falling back to `host`. `name` is used for sensor ids
  # and logs (defaults to the entity's object_id).
  #
  # `firmware` selects how the board is rebooted / version-checked:
  #   mitsubishi2mqtt  (default) - legacy gysmo38 firmware: /login + GET /reboot
  #   heatpump                   - sslivins/mitsubishi-heatpump REST API:
  #                                POST /api/system/restart, GET /api/status.
  # For a `heatpump` board that has web auth enabled, set `api_key` (keep the
  # value in secrets.yaml and reference it with !secret). Omit it if the board
  # has auth disabled (the API is then open).
  devices:
    - entity: climate.master_bedroom
      host: 192.168.1.181
      tracker: device_tracker.hvac_master
      name: master_bedroom
    - entity: climate.eric_s_bedroom
      host: 192.168.1.203
      tracker: device_tracker.hvac_bedroomb
      name: eric_bedroom
      firmware: heatpump
      # api_key: !secret eric_hvac_api_key   # only if Eric's board has web auth on
    - entity: climate.natalie_s_room
      host: 192.168.1.96
      tracker: device_tracker.hvac_twins
      name: natalie_room
    - entity: climate.twins_bedroom
      host: 192.168.1.227
      tracker: device_tracker.hvac_bedroomc
      name: twins_bedroom
